<!doctype html>
<html lang="hi">
    <head>
        <meta charset="UTF-8">
        <title>
            AI Face Identity System
        </title>
        <link href="style.css">
    </head>
    <body>
        <div class="scanner-container">
            <div class="scan-window"></div>
            <video id="video" autoplay muted></video>
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
        </div>

        <div class="info-panel">
            <h2 id="status">
                Searching....
            </h2>
            <hr>
            <div id="user-data">
                <p>
                    <strong>Name:</strong>
                    <span id="display-name">Searching...</span>
                </p>
                <p>
                    <strong>ID:</strong>
                    <span id="display-id">*********</span>
                </p>
            </div>
            <div id="new-user-form" style="display: none;">
            <input type="text" placeholder="Enter Name">
            <button class="save-btn">Register Identity</button>
            </div>
        </div>
        <script>
            const video=document.getElementById('video');
            navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{video.srcObject=stream;});

            async function stratCamera(){
                try{
                    const stream=await
                    navigator.mediaDevices.getUserMedia({
                        video:{facingMode:"user"},
                        audio:false
                    });
                    const video=document.getElementById('video');
                    video.srcObject=stream;
                    document.getElementById('status').innerText="System Active";
                }catch(eer){
                    console.error("Error accessing camera:",err);
                    document.getElementById('status').innerText="Permission Denied";
                    alert("please allow camera")
                }
            }
        </script>
    </body>
</html>
