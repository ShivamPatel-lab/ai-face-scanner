<!doctype html>
<html lang="hi">
    <head>
        <meta charset="UTF-8">
        <title>
            AI Face Identity System
        </title>
        <link rel="stylesheet" href="style.css">
        <style>
            body{
    background: #050505;
    color: #00f2ff;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}.scanner-container{
    display: flex;
    gap: 20px;
    padding: 20px;
}.scan-window{
    width: 400px;
    height: 400px;
    border: 1px solid rgba(0, 242, 255, 0.3);
    position: relative;
    background: #111;
    overflow: hidden;
}video{
    width: 100%;
    height: 4px;
    object-fit: cover;
    filter: grayscale(50%)contrast(120%);
}.scan-line{
    width: 100%;
    height: 4px;
    background: rgba(0, 242, 255, 0.8);
    box-shadow: 0 0 15px #00f2ff;
    position: absolute;
    top: 0;
    z-index: 10;
    animation: scan 3s infinite linear;
}
@keyframes scan{
    0%{top: 0;}
    50%{top: 100%;}
    100%{top: 0;}
}

.info-panel{
    width: 300px;
    padding: 20px;
    border: 1px solid #00f2ff;
    background: rgba(0, 242, 255, 0.5);
    box-shadow: inset 0 0 10px #00f2ff;
}.corner{
    position: absolute;
    width: 20px;
    height: 20px;
    border: 3px solid #00f2ff;
}.top-left{
    top: 0;
    left: 0;
    border-right: none;
    border-bottom: none;
}.top-right{
    top: 0;
    right: 0;
    border-left: none;
    border-bottom: none;
}.bottom-left{
    bottom: 0;
    left: 0;
    border-right: none;
    border-top: none;
}.bottom-right{
    bottom: 0;
    right: 0;
    border-left: none;
    border-top: none;
}
input{
    background: transparent;
    border: 1px solid #00f2ff;
    color: white;
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}.save-btn{
    background: #00f2ff;
    color: black;
    border: none;
    padding: 10px;
    width: 100px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}
        </style>
    </head>
    <body>
        <div class="scanner-container">
            <div class="scan-window"></div>
            <video id="video" autoplay muted></video>
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
        </div>

        <div class="info-panel">
            <h2 id="status">
                Searching....
            </h2>
            <hr>
            <div id="user-data">
                <p>
                    <strong>Name:</strong>
                    <span id="display-name">Searching...</span>
                </p>
                <p>
                    <strong>ID:</strong>
                    <span id="display-id">*********</span>
                </p>
            </div>
            <div id="new-user-form" style="display: none;">
            <input type="text" placeholder="Enter Name">
            <button class="save-btn">Register Identity</button>
            </div>
        </div>
        <script>
            const video=document.getElementById('video');
            navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{video.srcObject=stream;});

            async function stratCamera(){
                try{
                    const stream=await
                    navigator.mediaDevices.getUserMedia({
                        video:{facingMode:"user"},
                        audio:false
                    });
                    const video=document.getElementById('video');
                    video.srcObject=stream;
                    document.getElementById('status').innerText="System Active";
                }catch(eer){
                    console.error("Error accessing camera:",err);
                    document.getElementById('status').innerText="Permission Denied";
                    alert("please allow camera")
                }
            }
        </script>
    </body>
</html>
